name: Deploy

# Controls when the workflow will run
on:
  release:
    types: [released]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    name: "Deploy: ${{ github.event.release.tag_name || github.sha }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - uses: ./.github/workflows/environment-preload
        with:
          vars: ${{ toJSON(vars) }}

      - uses: ./.github/workflows/environment-prepare

      - name: Build
        run: pnpm build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_PAGES_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CF_PAGES_PROJECT_ID }} --branch=main
